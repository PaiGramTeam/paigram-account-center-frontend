name: Deploy Cloudflare Pages

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      target:
        description: Which frontend to deploy
        required: true
        default: both
        type: choice
        options:
          - both
          - user
          - admin
      deployment_mode:
        description: Cloudflare Pages deployment mode
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      ref:
        description: Git ref to deploy (branch, tag, or SHA)
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
      deploy_ref: ${{ steps.meta.outputs.deploy_ref }}
      deploy_branch: ${{ steps.meta.outputs.deploy_branch }}
      deploy_mode: ${{ steps.meta.outputs.deploy_mode }}
    steps:
      - name: Resolve deployment metadata
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "deploy_target=both" >> "$GITHUB_OUTPUT"
            echo "deploy_ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "deploy_branch=main" >> "$GITHUB_OUTPUT"
            echo "deploy_mode=production" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOY_REF="${{ inputs.ref }}"
          if [[ -z "$DEPLOY_REF" ]]; then
            DEPLOY_REF="${{ github.sha }}"
          fi

          DEPLOY_MODE="${{ inputs.deployment_mode }}"
          if [[ "$DEPLOY_MODE" == "production" ]]; then
            DEPLOY_BRANCH="main"
          else
            DEPLOY_BRANCH="preview-${{ github.run_number }}"
          fi

          echo "deploy_target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=$DEPLOY_REF" >> "$GITHUB_OUTPUT"
          echo "deploy_branch=$DEPLOY_BRANCH" >> "$GITHUB_OUTPUT"
          echo "deploy_mode=$DEPLOY_MODE" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ vars.BUN_VERSION || '1.2.15' }}

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Type check workspaces
        working-directory: frontend
        run: bun run type-check

      - name: Build user app
        if: needs.prepare.outputs.deploy_target == 'both' || needs.prepare.outputs.deploy_target == 'user'
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.CF_PAGES_USER_API_BASE_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.CF_PAGES_USER_TURNSTILE_SITE_KEY }}
        run: bun run build:user

      - name: Upload user app artifact
        if: needs.prepare.outputs.deploy_target == 'both' || needs.prepare.outputs.deploy_target == 'user'
        uses: actions/upload-artifact@v4
        with:
          name: user-pages-dist
          path: frontend/packages/user-app/dist
          if-no-files-found: error

      - name: Build admin app
        if: needs.prepare.outputs.deploy_target == 'both' || needs.prepare.outputs.deploy_target == 'admin'
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.CF_PAGES_ADMIN_API_BASE_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.CF_PAGES_ADMIN_TURNSTILE_SITE_KEY }}
        run: bun run build:admin

      - name: Upload admin app artifact
        if: needs.prepare.outputs.deploy_target == 'both' || needs.prepare.outputs.deploy_target == 'admin'
        uses: actions/upload-artifact@v4
        with:
          name: admin-pages-dist
          path: frontend/packages/admin-app/dist
          if-no-files-found: error

  deploy-user:
    name: Deploy user app
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.deploy_target == 'both' || needs.prepare.outputs.deploy_target == 'user'
    runs-on: ubuntu-latest
    environment: cloudflare-pages-${{ needs.prepare.outputs.deploy_mode }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_ref }}

      - name: Download user app artifact
        uses: actions/download-artifact@v4
        with:
          name: user-pages-dist
          path: frontend/packages/user-app/dist

      - name: Deploy user app to Cloudflare Pages
        id: deploy-user
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: frontend
          command: >-
            pages deploy packages/user-app/dist
            --project-name=${{ vars.CF_PAGES_PROJECT_USER }}
            --branch=${{ needs.prepare.outputs.deploy_branch }}

      - name: Show user deployment URL
        run: |
          echo "User deployment: ${{ steps.deploy-user.outputs.deployment-url }}"
          echo "User alias: ${{ steps.deploy-user.outputs.pages-deployment-alias-url }}"

  deploy-admin:
    name: Deploy admin app
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.deploy_target == 'both' || needs.prepare.outputs.deploy_target == 'admin'
    runs-on: ubuntu-latest
    environment: cloudflare-pages-${{ needs.prepare.outputs.deploy_mode }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.deploy_ref }}

      - name: Download admin app artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-pages-dist
          path: frontend/packages/admin-app/dist

      - name: Deploy admin app to Cloudflare Pages
        id: deploy-admin
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          workingDirectory: frontend
          command: >-
            pages deploy packages/admin-app/dist
            --project-name=${{ vars.CF_PAGES_PROJECT_ADMIN }}
            --branch=${{ needs.prepare.outputs.deploy_branch }}

      - name: Show admin deployment URL
        run: |
          echo "Admin deployment: ${{ steps.deploy-admin.outputs.deployment-url }}"
          echo "Admin alias: ${{ steps.deploy-admin.outputs.pages-deployment-alias-url }}"
